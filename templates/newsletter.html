<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fintech Signal — Newsletter Semanal</title>
  <style>
    body {
      font-family: 'Courier New', Courier, monospace;
      background-color: #0f0f0f;
      color: #e0e0e0;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 40px 24px;
    }
    .header {
      border-bottom: 1px solid #333;
      padding-bottom: 20px;
      margin-bottom: 32px;
    }
    .header h1 {
      font-size: 20px;
      color: #00ff88;
      margin: 0 0 4px 0;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .header p {
      font-size: 12px;
      color: #555;
      margin: 0;
    }
    .content {
      font-size: 15px;
      line-height: 1.75;
      color: #d0d0d0;
      white-space: pre-wrap;
    }
    .content strong, .content b {
      color: #ffffff;
    }
    .content a {
      color: #00ff88;
      text-decoration: none;
    }
    .content a:hover {
      text-decoration: underline;
    }
    .footer {
      border-top: 1px solid #222;
      margin-top: 40px;
      padding-top: 20px;
      font-size: 12px;
      color: #444;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>⚡ Fintech Signal</h1>
      <p>Newsletter semanal de innovación fintech para ingenieros — {date}</p>
    </div>
    <div class="content">
{content}
    </div>
    <div class="footer">
      <p>Generado automáticamente con Claude + fuentes públicas de innovación fintech.</p>
    </div>
  </div>
</body>
</html>
