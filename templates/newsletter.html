<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fintech Signal — Newsletter Semanal</title>
  <style>
    body {
      font-family: Georgia, 'Times New Roman', serif;
      background-color: #ffffff;
      color: #111111;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 620px;
      margin: 0 auto;
      padding: 48px 32px;
    }
    .header {
      border-bottom: 2px solid #111111;
      padding-bottom: 20px;
      margin-bottom: 36px;
    }
    .header h1 {
      font-size: 22px;
      color: #111111;
      margin: 0 0 6px 0;
      letter-spacing: 3px;
      text-transform: uppercase;
      font-weight: bold;
    }
    .header p {
      font-size: 12px;
      color: #888888;
      margin: 0;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .content {
      font-size: 15px;
      line-height: 1.8;
      color: #111111;
      white-space: pre-wrap;
    }
    .content strong, .content b {
      color: #111111;
      font-weight: bold;
    }
    .content a {
      color: #1a56cc;
      text-decoration: none;
    }
    .content a:hover {
      text-decoration: underline;
    }
    .footer {
      border-top: 1px solid #dddddd;
      margin-top: 48px;
      padding-top: 20px;
      font-size: 11px;
      color: #999999;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Fintech Signal</h1>
      <p>Newsletter semanal — {date}</p>
    </div>
    <div class="content">
{content}
    </div>
    <div class="footer">
      <p>Por Diego Valdivia</p>
      <p>Si este correo llegó a spam, agrégalo a tus contactos para recibirlo correctamente la próxima semana.</p>
    </div>
  </div>
</body>
</html>
